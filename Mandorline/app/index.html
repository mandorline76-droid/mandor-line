<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MandorLine – Login</title>
  <meta name="description" content="Login petugas lapangan MandorLine">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="login-page">
    <div class="login-logo">
      <div class="login-app-name">MANDORLINE</div>
      <div class="login-tagline">Sistem Informasi Patroli Jaringan</div>
    </div>

    <div class="login-card">
      <div class="login-form">
        <div class="login-error" id="loginError">Username atau password salah.</div>

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Username" autocomplete="username"
            autocapitalize="none">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Password"
            autocomplete="current-password">
        </div>

        <button class="btn btn-primary mt-12" id="btnLogin" onclick="doLogin()">
          LOGIN SEKARANG
        </button>
      </div>
    </div>

    <p class="text-sm text-muted mt-16 text-center" style="color:var(--primary-light) !important;">MandorLine v2.0
      &copy; 2026</p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
