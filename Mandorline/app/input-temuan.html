<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MandorLine – Input Temuan</title>
    <meta name="description" content="Form input temuan patroli jaringan">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-shell">
        <!-- Top Bar -->
        <header class="topbar">
            <button class="topbar-back" onclick="history.back()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M19 12H5M12 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <span class="topbar-title">Input Temuan</span>
            <div style="width:36px"></div>
        </header>

        <!-- Main -->
        <main class="main-content">

            <!-- No Kondisi (auto) -->
            <div class="form-group">
                <label class="form-label">No. Kondisi</label>
                <div class="no-kondisi-display" id="noKondisiDisplay">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" stroke-linecap="round" />
                    </svg>
                    <span id="noKondisiVal">Memuat...</span>
                </div>
            </div>

            <!-- Nama Petugas -->
            <div class="form-group">
                <label class="form-label" for="namaPetugas">Nama Petugas <span class="required">*</span></label>
                <input type="text" id="namaPetugas" class="form-control uppercase" autocapitalize="characters"
                    oninput="toUpperCase(this)">
            </div>

            <!-- Tanggal & Waktu (auto) -->
            <div class="form-group">
                <label class="form-label">Tanggal & Waktu Patroli</label>
                <input type="text" id="tanggalPatroli" class="form-control" readonly placeholder="Otomatis terisi">
                <p class="form-hint">Diisi otomatis saat form dibuka</p>
            </div>

            <!-- Penyulang -->
            <div class="form-group">
                <label class="form-label" for="penyulang">Penyulang <span class="required">*</span></label>
                <select id="penyulang" class="form-control">
                    <option value="">-- Pilih Penyulang --</option>
                    <option>BTJR</option>
                    <option>CKLW</option>
                    <option>CKRH</option>
                    <option>GLNG</option>
                    <option>LBSR</option>
                    <option>MWTI</option>
                    <option>PGP</option>
                    <option>PSLU</option>
                    <option>PRBY</option>
                    <option>PTB</option>
                    <option>RJDL</option>
                    <option>SLCU</option>
                </select>
            </div>

            <!-- Kondisi Cuaca -->
            <div class="form-group">
                <label class="form-label" for="kondisiCuaca">Kondisi Cuaca <span class="required">*</span></label>
                <select id="kondisiCuaca" class="form-control">
                    <option value="">-- Pilih Cuaca --</option>
                    <option>Cerah</option>
                    <option>Berawan</option>
                    <option>Hujan Ringan</option>
                    <option>Hujan Lebat</option>
                </select>
            </div>

            <!-- Segmen / Section -->
            <div class="form-group">
                <label class="form-label" for="segmen">Segmen / Section <span class="required">*</span></label>
                <input type="text" id="segmen" class="form-control uppercase" autocapitalize="characters"
                    oninput="toUpperCase(this)">
            </div>

            <!-- Titik Koordinat + GPS -->
            <div class="form-group">
                <label class="form-label" for="koordinat">Titik Koordinat <span class="required">*</span></label>
                <div class="gps-row">
                    <input type="text" id="koordinat" class="form-control" placeholder="-7.123456, 110.654321" readonly>
                    <button class="btn-gps" id="btnGps" onclick="ambilGPS()">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"
                            viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
                        </svg>
                        GPS
                    </button>
                </div>
                <p class="form-hint" id="gpsHint">Tekan GPS untuk ambil lokasi otomatis</p>
            </div>

            <!-- Jenis Temuan -->
            <div class="form-group">
                <label class="form-label" for="jenisTemuan">Jenis Temuan <span class="required">*</span></label>
                <select id="jenisTemuan" class="form-control">
                    <option value="">-- Pilih Jenis Temuan --</option>
                    <option>Pohon Nempel Di Jaringan SUTM A3CS</option>
                    <option>Pohon Dekat Dengan Jaringan SUTM A3C/A3CS &lt;2,5</option>
                    <option>Arku Layangan</option>
                    <option>Andongan Gsw Kendor</option>
                    <option>SUTM Dekat Bangunan/Baliho</option>
                    <option>Tiang TM Miring</option>
                    <option>Tiang TM Keropos/Retak</option>
                    <option>Suara Desis Pada Jaringan/Kontruksi</option>
                    <option>Andongan SUTM Kendor</option>
                    <option>Tumbuhan Rambat Pada Tiang/Kontruksi Gardu</option>
                    <option>Isolator Flash Over/Berlumut/Pecah</option>
                    <option>Kawat SUTM Rantas</option>
                    <option>FCO Flash Over/Berlumut/Pecah</option>
                    <option>Arrester Flash Over/Berlumut/Pecah</option>
                    <option>Trafo Rembes/Bocor</option>
                </select>
            </div>

            <!-- Lokasi Temuan -->
            <div class="form-group">
                <label class="form-label" for="lokasiTemuan">Lokasi Temuan <span class="required">*</span></label>
                <input type="text" id="lokasiTemuan" class="form-control uppercase" autocapitalize="characters"
                    oninput="toUpperCase(this)">
            </div>

            <!-- Foto Temuan -->
            <div class="form-group">
                <label class="form-label">Foto Temuan</label>
                <div class="photo-grid">
                    <!-- Foto 1 -->
                    <div class="photo-box">
                        <input type="file" id="fotoTemuan1" accept="image/*" capture="environment"
                            onchange="previewPhoto(this,'prev1')">
                        <img class="photo-preview" id="prev1" src="" alt="Foto 1">
                        <div class="photo-placeholder">
                            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5"
                                viewBox="0 0 24 24">
                                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
                                <circle cx="12" cy="13" r="4" />
                            </svg>
                            Foto 1
                        </div>
                    </div>
                    <!-- Foto 2 -->
                    <div class="photo-box">
                        <input type="file" id="fotoTemuan2" accept="image/*" capture="environment"
                            onchange="previewPhoto(this,'prev2')">
                        <img class="photo-preview" id="prev2" src="" alt="Foto 2">
                        <div class="photo-placeholder">
                            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5"
                                viewBox="0 0 24 24">
                                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
                                <circle cx="12" cy="13" r="4" />
                            </svg>
                            Foto 2
                        </div>
                    </div>
                </div>
            </div>

            <!-- Keterangan Tambahan -->
            <div class="form-group">
                <label class="form-label" for="keterangan">Keterangan Tambahan</label>
                <textarea id="keterangan" class="form-control uppercase" rows="3" autocapitalize="characters"
                    oninput="toUpperCase(this)"></textarea>
            </div>

            <!-- Submit -->
            <button class="btn btn-primary mt-16" id="btnSimpan" onclick="simpanTemuan()">
                SIMPAN TEMUAN
            </button>

            <div style="height:8px"></div>
        </main>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a class="nav-item" href="dashboard.html">
                <svg fill="currentColor" viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
                <span>Home</span>
            </a>
            <a class="nav-item active" href="input-temuan.html">
                <svg fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
                <span>Tambah</span>
            </a>
            <a class="nav-item" href="list-temuan.html">
                <svg fill="currentColor" viewBox="0 0 24 24">
                    <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z" />
                </svg>
                <span>List</span>
            </a>
        </nav>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/input-temuan.js"></script>
</body>

</html>
