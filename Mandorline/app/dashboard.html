<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MandorLine – Dashboard</title>
  <meta name="description" content="Dashboard monitoring temuan patroli jaringan">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="app-shell">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-logo">
        <span class="topbar-title">MANDORLINE</span>
      </div>
      <button class="btn btn-sm btn-secondary" id="btnLogout" onclick="doLogout()"
        style="width:auto;padding:6px 12px;font-size:12px">Keluar</button>
    </header>

    <!-- Main -->
    <main class="main-content">
      <!-- Greeting -->
      <div class="mb-12" style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
          <div class="text-muted text-sm" id="greetDate">—</div>
          <div class="font-bold" style="font-size:20px; color:var(--primary-dark)" id="greetUser">Selamat Datang</div>
        </div>
      </div>

      <!-- Stats -->
      <div class="section-label">Rekapitulasi Temuan</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Temuan</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card open">
          <div class="stat-label">Belum TL</div>
          <div class="stat-value" id="statOpen">—</div>
        </div>
        <div class="stat-card progress">
          <div class="stat-label">In Progress</div>
          <div class="stat-value" id="statProg">—</div>
        </div>
        <div class="stat-card closed">
          <div class="stat-label">Selesai</div>
          <div class="stat-value" id="statDone">—</div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="section-label">Menu Utama</div>
      <div class="quick-actions">
        <a href="input-temuan.html" class="action-card">
          <div class="action-icon">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M12 5v14M5 12h14" stroke-linecap="round" />
            </svg>
          </div>
          <div>
            <div class="action-title">Input Temuan</div>
            <div class="action-sub">Catat patroli baru</div>
          </div>
        </a>
        <a href="list-temuan.html" class="action-card alt">
          <div class="action-icon">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke-linecap="round" />
            </svg>
          </div>
          <div>
            <div class="action-title">Data Temuan</div>
            <div class="action-sub">Lihat & tindak lanjut</div>
          </div>
        </a>
      </div>

      <!-- Recent 3 temuan -->
      <div class="section-label">Update Paling Baru</div>
      <div class="temuan-list" id="recentList">
        <div class="empty-state">
          <div class="spinner" style="border-color:var(--border);border-top-color:var(--primary-main)"></div>
        </div>
      </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a class="nav-item active" href="dashboard.html">
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
        <span>Home</span>
      </a>
      <a class="nav-item" href="input-temuan.html">
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
        </svg>
        <span>Tambah</span>
      </a>
      <a class="nav-item" href="list-temuan.html">
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z" />
        </svg>
        <span>List</span>
      </a>
    </nav>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>

</html>
